# Fly.io config for the Espresso Tracker web app.
# Rename `app` to something globally unique before first deploy, e.g.
#   fly launch --no-deploy   (generates a name and may rewrite this file)
# or edit it here and run `fly deploy`.

app = "espresso-tracker"
primary_region = "sjc"  # San Jose — closest Fly region to the Central Valley

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # keep it warm — no cold start when opening on your phone
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
