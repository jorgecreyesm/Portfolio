<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header h2 {
      font-size: 13px;
      font-weight: 700;
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .field { margin-bottom: 11px; }
    label {
      display: block;
      font-size: 10px;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    input, select, textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #38bdf8;
    }
    input::placeholder, textarea::placeholder { color: #475569; }
    textarea { resize: none; height: 52px; }
    select { cursor: pointer; }
    select option { background: #1e293b; }
    .url-preview {
      font-size: 10px;
      color: #475569;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.3px;
    }
    button:hover:not(:disabled) { background: #0284c7; }
    button:disabled { background: #334155; color: #64748b; cursor: default; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success { color: #4ade80; }
    .error   { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <h2>📋 Log Application</h2>
  </div>

  <div class="field">
    <label>Job Title</label>
    <input type="text" id="jobTitle" placeholder="e.g. Data Analyst">
    <div class="url-preview" id="urlPreview"></div>
  </div>

  <div class="field">
    <label>Pay Range</label>
    <input type="text" id="pay" placeholder="e.g. 60k – 80k / yr">
  </div>

  <div class="field">
    <label>Resume Used</label>
    <select id="resume">
      <option value="">Loading…</option>
    </select>
  </div>

  <div class="field">
    <label>Follow Up / Notes</label>
    <textarea id="followUp" placeholder="Optional notes, referral, deadline…"></textarea>
  </div>

  <button id="logBtn">Log Application</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
